<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Content</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header .meta {
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 30px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            color: #667eea;
            font-size: 22px;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .info-item label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-item value {
            display: block;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        .description {
            line-height: 1.8;
            color: #555;
            font-size: 16px;
        }
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin: 5px 5px 5px 0;
        }
        .rating {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stars {
            color: #ffc107;
            font-size: 20px;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }
        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }
            .content {
                padding: 20px;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="courseTitle">Course Title</h1>
            <div class="meta">
                <span id="courseCategory">Category</span> • 
                <span id="courseId">ID: --</span>
            </div>
        </div>
        
        <div class="content">
            <div class="section">
                <h2>Course Information</h2>
                <div class="info-grid">
                    <div class="info-item">
                        <label>Price</label>
                        <value id="coursePrice">$--</value>
                    </div>
                    <div class="info-item">
                        <label>Rating</label>
                        <div class="rating">
                            <span class="stars" id="courseStars">⭐⭐⭐⭐⭐</span>
                            <span id="courseRating">--</span>
                        </div>
                    </div>
                    <div class="info-item">
                        <label>Reviews</label>
                        <value id="courseReviews">--</value>
                    </div>
                    <div class="info-item">
                        <label>Category</label>
                        <value id="courseCategoryValue">--</value>
                    </div>
                </div>
            </div>
            
            <div class="section">
                <h2>About This Course</h2>
                <p class="description" id="courseDescription">
                    Course description will be loaded here...
                </p>
            </div>
            
            <div class="section">
                <h2>Course Details</h2>
                <div id="courseDetails">
                    <span class="badge" id="courseIdBadge">ID: --</span>
                    <span class="badge" id="courseCategoryBadge">Category</span>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>Course content loaded from Native App</p>
            <p id="loadTime">Loaded at: --</p>
        </div>
    </div>

    <script>
    
        function loadCourseData() {
            
            const urlParams = new URLSearchParams(window.location.search);
            const courseData = urlParams.get('data');
            
            if (courseData) {
                try {
                    const course = JSON.parse(decodeURIComponent(courseData));
                    updateCourseContent(course);
                } catch (e) {
                    console.error('Error parsing course data:', e);
                }
            }
            
            if (window.courseData) {
                updateCourseContent(window.courseData);
            }
        }
        
        function updateCourseContent(course) {
            // Update title
            if (course.title || course.name) {
                document.getElementById('courseTitle').textContent = course.title || course.name;
            }
            
            // Update category
            if (course.category) {
                document.getElementById('courseCategory').textContent = course.category;
                document.getElementById('courseCategoryValue').textContent = course.category;
                document.getElementById('courseCategoryBadge').textContent = course.category;
            }
            
            // Update ID
            if (course.id) {
                document.getElementById('courseId').textContent = `ID: ${course.id}`;
                document.getElementById('courseIdBadge').textContent = `ID: ${course.id}`;
            }
            
            // Update price
            if (course.price) {
                document.getElementById('coursePrice').textContent = `$${course.price}`;
            }
            
            // Update rating
            if (course.rating) {
                const rate = course.rating.rate || 0;
                const count = course.rating.count || 0;
                document.getElementById('courseRating').textContent = `${rate.toFixed(1)} / 5.0`;
                document.getElementById('courseReviews').textContent = `${count} reviews`;
                
                // Update stars
                const stars = '⭐'.repeat(Math.round(rate));
                document.getElementById('courseStars').textContent = stars;
            }
            
            // Update description
            if (course.description) {
                document.getElementById('courseDescription').textContent = course.description;
            }
            
            // Update load time
            document.getElementById('loadTime').textContent = `Loaded at: ${new Date().toLocaleString()}`;
        }
    
        window.addEventListener('load', loadCourseData);
        
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'courseData') {
                updateCourseContent(event.data.course);
            }
        });
    </script>
</body>
</html>
